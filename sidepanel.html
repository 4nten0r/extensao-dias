<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 15px;
            background-color: #F5F5F5; /* Cor baseada no seu JSON */
            margin: 0;
        }
        h3 { color: #005A9C; margin-top: 0; }
        textarea {
            width: 100%;
            height: 250px;
            box-sizing: border-box;
            padding: 8px;
            border: 1px solid #1976D2;
            border-radius: 4px;
            resize: none;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background-color: #1976D2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #005A9C; }
    </style>
</head>
<body>
    <h3>Injetor de Lote</h3>
    <textarea id="numerosInput" placeholder="Cole os 44 números aqui..."></textarea>
    <button id="processarBtn">Injetar Lote (26 ao 34)</button>

    <script src="sidepanel.js"></script>
</body>
</html>
